<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Dashboard | Antarctic Air</title>
<script src="/tailwindcss.js"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Manrope', sans-serif; background-color: #071325; color: #d7e3fc; }
    h1, h2, h3, .font-headline { font-family: 'Space Grotesk', sans-serif; }
    .arctic-gradient { background: linear-gradient(135deg, #a1c9ff 0%, #4494e7 100%); }
    .input-ghost { background: transparent; border: none; border-bottom: 1px solid rgba(65, 71, 81, 0.4); color: white; padding: 0.5rem 0; font-family: 'Manrope', sans-serif; transition: all 0.3s; width: 100%; }
    .input-ghost:focus { outline: none; border-bottom: 2px solid #a1c9ff; }
</style>
</head>
<body class="selection:bg-primary-container selection:text-white relative min-h-screen">

<!-- Login View -->
<div id="login-view" class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="bg-surface-container-high p-8 rounded-xl border border-outline-variant/10 shadow-[0_0_40px_rgba(161,201,255,0.06)] w-full max-w-sm">
        <h2 class="text-3xl font-headline font-bold text-white mb-6 text-center">Admin Access</h2>
        <form id="login-form" class="space-y-6">
            <input type="text" id="username" placeholder="Username" required class="input-ghost">
            <input type="password" id="password" placeholder="Password" required class="input-ghost">
            <div id="login-msg" class="text-red-400 text-sm font-bold"></div>
            <button type="submit" class="arctic-gradient text-on-primary-container w-full py-3 rounded-full font-label font-bold uppercase tracking-widest active:scale-95 duration-200">
                Login
            </button>
        </form>
        <div class="mt-4 text-center"><a href="/" class="text-sm text-primary hover:underline">← Back to Site</a></div>
    </div>
</div>

<!-- Dashboard View -->
<div id="dashboard-view" class="hidden min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-headline font-bold text-white">Command Center</h1>
            <div class="flex gap-4 items-center">
                <a href="/" class="text-primary hover:underline text-sm font-bold">View Site</a>
                <button id="btn-logout" class="bg-surface-container-high border border-outline-variant/30 hover:bg-surface-container-highest px-6 py-2 rounded-full font-label text-sm text-white font-bold transition-all">Logout</button>
            </div>
        </div>

        <div class="space-y-8">
                
                <!-- Appointments Table -->
                <div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 overflow-hidden flex flex-col">
                    <h3 class="text-xl font-headline font-bold text-white mb-4">Booking Requests</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="text-on-surface-variant font-label uppercase tracking-widest text-xs border-b border-outline-variant/20">
                                    <th class="pb-3 px-2">Date/Time</th>
                                    <th class="pb-3 px-2">Name & Contact</th>
                                    <th class="pb-3 px-2">Service</th>
                                    <th class="pb-3 px-2">Status</th>
                                    <th class="pb-3 px-2">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="appointments-tbody" class="divide-y divide-outline-variant/10">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Contacts Table -->
                <div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 overflow-hidden flex flex-col">
                    <h3 class="text-xl font-headline font-bold text-white mb-4">Contact Form Submissions</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="text-on-surface-variant font-label uppercase tracking-widest text-xs border-b border-outline-variant/20">
                                    <th class="pb-3 px-2">Date Submitted</th>
                                    <th class="pb-3 px-2">Name & Contact</th>
                                    <th class="pb-3 px-2">Service</th>
                                    <th class="pb-3 px-2">Message</th>
                                    <th class="pb-3 px-2">Status</th>
                                    <th class="pb-3 px-2">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="contacts-tbody" class="divide-y divide-outline-variant/10">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>

        </div>
    </div>
</div>

<script src="/admin.js"></script>
</body></html>
